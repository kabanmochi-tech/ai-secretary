# ================================================================
# AI秘書 — 朝のサマリー自動実行（GitHub Actions）
#
# GitHub Secrets に登録が必要なもの:
#   LINE_CHANNEL_ACCESS_TOKEN  : LINEチャネルアクセストークン
#   LINE_CHANNEL_SECRET        : LINEチャネルシークレット
#   LINE_USER_ID               : あなたのLINE USER ID
#   ANTHROPIC_API_KEY          : AnthropicのAPIキー
#   GOOGLE_CLIENT_ID           : Google OAuthクライアントID
#   GOOGLE_CLIENT_SECRET       : Google OAuthクライアントシークレット
#   RENDER_GOOGLE_TOKEN_JSON   : tokens/google_token.json の中身（JSON文字列）
#
# RENDER_GOOGLE_TOKEN_JSON は setup.js 実行後に
#   cat tokens/google_token.json
# の出力をそのままコピーして貼り付けてください。
# ================================================================

name: 朝のブリーフィング（毎朝8時JST）

on:
  schedule:
    - cron: '0 23 * * *'   # UTC 23:00 = JST 08:00
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: 環境変数を設定
        run: |
          echo "LINE_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" >> .env
          echo "LINE_CHANNEL_SECRET=${{ secrets.LINE_CHANNEL_SECRET }}" >> .env
          echo "LINE_USER_ID=${{ secrets.LINE_USER_ID }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "RENDER_GOOGLE_TOKEN_JSON=${{ secrets.RENDER_GOOGLE_TOKEN_JSON }}" >> .env

      - name: 朝のブリーフィングを送信
        run: node src/briefing.js
