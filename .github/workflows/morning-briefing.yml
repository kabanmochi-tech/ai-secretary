# ================================================================
# AI秘書 — 朝・夜ブリーフィング自動実行（GitHub Actions）
# ================================================================

name: ブリーフィング（朝8時・夜20時 JST）

on:
  schedule:
    - cron: '0 23 * * *'   # UTC 23:00 = JST 08:00（朝）
    - cron: '0 11 * * *'   # UTC 11:00 = JST 20:00（夜）
  workflow_dispatch:
    inputs:
      type:
        description: 'morning or evening'
        required: false
        default: 'morning'

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: 環境変数を設定
        run: |
          echo "LINE_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" >> .env
          echo "LINE_CHANNEL_SECRET=${{ secrets.LINE_CHANNEL_SECRET }}" >> .env
          echo "LINE_USER_ID=${{ secrets.LINE_USER_ID }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env

      - name: Googleトークンをファイルに書き込む
        env:
          TOKEN_JSON: ${{ secrets.RENDER_GOOGLE_TOKEN_JSON }}
        run: |
          mkdir -p tokens
          echo "$TOKEN_JSON" > tokens/google_token.json

      - name: ブリーフィングの種別を判定
        id: type
        run: |
          HOUR=$(TZ=Asia/Tokyo date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.type }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge 19 ]; then
            echo "type=evening" >> $GITHUB_OUTPUT
          else
            echo "type=morning" >> $GITHUB_OUTPUT
          fi

      - name: ブリーフィングを送信
        run: node src/briefing.js ${{ steps.type.outputs.type }}

      - name: リフレッシュ済みトークンをSecretsに書き戻す
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT が未設定のためトークン書き戻しをスキップします"
            exit 0
          fi
          if [ ! -f tokens/google_token.json ]; then
            echo "トークンファイルが存在しないためスキップします"
            exit 0
          fi
          TOKEN=$(cat tokens/google_token.json)
          gh secret set RENDER_GOOGLE_TOKEN_JSON --body "$TOKEN" --repo ${{ github.repository }}
          echo "✅ RENDER_GOOGLE_TOKEN_JSON を更新しました"
